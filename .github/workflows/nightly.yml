name: Nightly Image

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily
  workflow_dispatch:        # allow manual runs

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        # workflow_dispatch always builds; scheduled builds only if main moved in last 24h
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$(git log --since='24 hours ago' --format=%H HEAD)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No commits in the last 24h — skipping nightly build."
          fi

  build:
    needs: changes
    if: needs.changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser/nightly needs full history + tags

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.x'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Compute nightly date
        run: echo "NIGHTLY_DATE=$(date -u +%Y%m%d)" >> "$GITHUB_ENV"

      - name: Build & push nightly image
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --skip=announce,validate --config .goreleaser.nightly.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_TOKEN }}
          NIGHTLY_DATE: ${{ env.NIGHTLY_DATE }}
