baseURL = "https://opensoho.github.io/"
title = "OpenSOHO"

contentDir = "content/en"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableMissingTranslationPlaceholders = true

enableRobotsTXT = true
enableGitInfo = true

[taxonomies]
tag = "tags"
category = "categories"

[params]
copyright = "OpenSOHO Authors"
github_repo = "https://github.com/rubenbe/opensoho"
github_project_repo = "https://github.com/rubenbe/opensoho"
github_branch = "main"
github_subdir = "docs/content/en"

[params.ui]
sidebar_menu_compact = true
navbar_logo = false
breadcrumb_disable = false
sidebar_search_disable = false

[[params.links.user]]
  name = "GitHub"
  url = "https://github.com/rubenbe/opensoho"
  icon = "fab fa-github"
  desc = "Development takes place here!"

[[params.links.developer]]
  name = "GitHub"
  url = "https://github.com/rubenbe/opensoho"
  icon = "fab fa-github"
  desc = "Development takes place here!"

[module]
  proxy = "direct"
  [[module.imports]]
    path = "github.com/google/docsy"
  [[module.imports]]
    path = "github.com/google/docsy/dependencies"
